<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CyberScan | Port Scanner Dashboard</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&family=Roboto:wght@300;400;700&display=swap" rel="stylesheet">
</head>
<body>
    <div class="container">
        <header>
            <div class="logo">
                <h1>CYBER<span>SCAN</span></h1>
                <p>Advanced Net Security Tool</p>
            </div>
            <div class="status-indicator">
                <span id="system-status">System Ready</span>
            </div>
        </header>

        <main>
            <section class="scan-config">
                <div class="card glass">
                    <h3>Scanner Configuration</h3>
                    <div class="form-group">
                        <label for="target">Target Host (IP or Domain)</label>
                        <input type="text" id="target" placeholder="e.g. scanme.nmap.org" value="scanme.nmap.org">
                    </div>
                    <div class="form-row">
                        <div class="form-group">
                            <label for="start_port">Start Port</label>
                            <input type="number" id="start_port" value="1">
                        </div>
                        <div class="form-group">
                            <label for="end_port">End Port</label>
                            <input type="number" id="end_port" value="1024">
                        </div>
                        <div class="form-group">
                            <label for="threads">Threads</label>
                            <input type="number" id="threads" value="100">
                        </div>
                    </div>
                    <button id="scan-btn" class="btn-primary">START SCAN</button>
                </div>
            </section>

            <section class="results-area">
                <div class="card glass result-box">
                    <div class="result-header">
                        <h3>Scan Results</h3>
                        <div id="target-info" class="hidden">
                            Target: <span id="res-target">---</span> | IP: <span id="res-ip">---</span>
                        </div>
                    </div>
                    <div id="loading" class="hidden">
                        <div class="scanner-line"></div>
                        <p>Scanning in progress...</p>
                    </div>
                    <div class="table-container">
                        <table id="results-table">
                            <thead>
                                <tr>
                                    <th>Port</th>
                                    <th>Service</th>
                                    <th>Status</th>
                                </tr>
                            </thead>
                            <tbody id="results-body">
                                <!-- Results will be added here -->
                            </tbody>
                        </table>
                    </div>
                    <div id="summary" class="hidden">
                        <p id="res-summary">Found 0 open ports.</p>
                    </div>
                </div>
            </section>
        </main>

        <footer>
            <p>&copy; 2026 CyberScan | Developed by <a href="https://github.com/mehmeteminyilmaz" target="_blank">mehmeteminyilmaz</a></p>
        </footer>
    </div>

    <script>
        document.getElementById('scan-btn').addEventListener('click', async () => {
            const target = document.getElementById('target').value;
            const start_port = document.getElementById('start_port').value;
            const end_port = document.getElementById('end_port').value;
            const threads = document.getElementById('threads').value;
            
            const btn = document.getElementById('scan-btn');
            const loading = document.getElementById('loading');
            const resultsBody = document.getElementById('results-body');
            const summary = document.getElementById('summary');
            const targetInfo = document.getElementById('target-info');

            if (!target) {
                alert('Please enter a target!');
                return;
            }

            // UI Reset
            btn.disabled = true;
            btn.innerText = 'SCANNING...';
            loading.classList.remove('hidden');
            resultsBody.innerHTML = '';
            summary.classList.add('hidden');
            targetInfo.classList.add('hidden');

            try {
                const response = await fetch('/scan', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ target, start_port, end_port, threads })
                });

                const data = await response.json();

                if (response.ok) {
                    document.getElementById('res-target').innerText = data.target;
                    document.getElementById('res-ip').innerText = data.ip;
                    document.getElementById('res-summary').innerText = `Scan complete. Found ${data.count} open ports.`;
                    
                    targetInfo.classList.remove('hidden');
                    summary.classList.remove('hidden');

                    if (data.results.length === 0) {
                        resultsBody.innerHTML = '<tr><td colspan="3" class="no-ports">No open ports found.</td></tr>';
                    } else {
                        data.results.forEach(res => {
                            const row = `
                                <tr>
                                    <td>${res.port}</td>
                                    <td>${res.service}</td>
                                    <td class="status-open">${res.status}</td>
                                </tr>
                            `;
                            resultsBody.innerHTML += row;
                        });
                    }
                } else {
                    alert('Error: ' + data.error);
                }
            } catch (error) {
                console.error(error);
                alert('An error occurred during scan.');
            } finally {
                btn.disabled = false;
                btn.innerText = 'START SCAN';
                loading.classList.add('hidden');
            }
        });
    </script>
</body>
</html>
